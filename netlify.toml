[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"
  # Ensures Prisma client is found by the runtime
  PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
  AWS_LAMBDA_JS_RUNTIME = "nodejs20.x"
  # Use modern Netlify Next.js runtime
  NEXTJS_V2_RUNTIME = "true"


